<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký — Thời Tiết Hà Nội</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { colors: { "weather-accent": "#3b82f6" } } },
      };
    </script>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-blue-50 flex items-center justify-center p-4"
  >
    <div class="w-full max-w-md">
      <!-- Brand -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center gap-3 mb-2">
          <div
            class="w-11 h-11 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30"
          >
            <svg
              class="w-6 h-6 text-white"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79zM4 10.5H1v2h3zm9-9.95h-2V3.5h2zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79zM20 10.5v2h3v-2zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41z"
              />
            </svg>
          </div>
          <span class="text-2xl font-bold text-gray-800">Thời Tiết Hà Nội</span>
        </div>
        <p class="text-gray-500 text-sm">
          Tạo tài khoản để sử dụng trợ lý thời tiết
        </p>
      </div>

      <!-- Card -->
      <div class="bg-white rounded-2xl shadow-xl shadow-gray-200/50 p-8">
        <h2 class="text-xl font-semibold text-gray-800 mb-6">Đăng ký</h2>

        {% if error %}
        <div
          class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-lg mb-5"
        >
          {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/register" autocomplete="on">
          <div class="mb-4">
            <label
              for="username"
              class="block text-sm font-medium text-gray-700 mb-1.5"
              >Tên đăng nhập</label
            >
            <input
              type="text"
              id="username"
              name="username"
              required
              autofocus
              minlength="3"
              maxlength="30"
              pattern="[a-zA-Z0-9_]+"
              class="w-full border border-gray-300 rounded-lg px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow"
              placeholder="Chữ cái, số, dấu gạch dưới (3-30 ký tự)"
            />
          </div>

          <div class="mb-4">
            <label
              for="email"
              class="block text-sm font-medium text-gray-700 mb-1.5"
              >Email</label
            >
            <input
              type="email"
              id="email"
              name="email"
              required
              class="w-full border border-gray-300 rounded-lg px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow"
              placeholder="example@email.com"
            />
          </div>

          <div class="mb-6">
            <label
              for="password"
              class="block text-sm font-medium text-gray-700 mb-1.5"
              >Mật khẩu</label
            >
            <input
              type="password"
              id="password"
              name="password"
              required
              minlength="6"
              class="w-full border border-gray-300 rounded-lg px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow"
              placeholder="Ít nhất 6 ký tự"
            />
          </div>

          <button
            type="submit"
            class="w-full bg-blue-500 text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-blue-600 active:bg-blue-700 transition-colors shadow-sm"
          >
            Tạo tài khoản
          </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
          Đã có tài khoản?
          <a href="/login" class="text-blue-500 font-medium hover:underline"
            >Đăng nhập</a
          >
        </p>
      </div>

      <!-- Back link -->
      <div class="text-center mt-6">
        <a
          href="/"
          class="text-sm text-gray-400 hover:text-gray-600 transition-colors"
        >
          ← Quay lại trang chủ
        </a>
      </div>
    </div>
  </body>
</html>

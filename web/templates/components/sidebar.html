<!-- Sidebar — weather.com style navigation -->
<aside class="w-60 bg-weather-sidebar flex flex-col min-h-screen shrink-0">
  <!-- Logo / Brand -->
  <div class="px-5 py-5 flex items-center gap-3">
    <div
      class="w-9 h-9 bg-blue-500 rounded-lg flex items-center justify-center"
    >
      <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
        <path
          d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79zM4 10.5H1v2h3zm9-9.95h-2V3.5h2zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79zM20 10.5v2h3v-2zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41z"
        />
      </svg>
    </div>
    <div>
      <div class="text-white font-bold text-sm">Thời Tiết</div>
      <div class="text-gray-400 text-xs">Hà Nội</div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 py-2">
    <!-- Weather pages -->
    <a
      href="/"
      data-page="today"
      class="sidebar-link {% if active_page == 'today' %}active{% endif %}"
      hx-get="/"
      hx-target="#main-content"
      hx-swap="innerHTML"
      hx-push-url="true"
      hx-select="#main-content > *"
    >
      <svg
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"
        />
      </svg>
      <span>Hôm nay</span>
    </a>

    <a
      href="/hourly"
      data-page="hourly"
      class="sidebar-link {% if active_page == 'hourly' %}active{% endif %}"
      hx-get="/hourly"
      hx-target="#main-content"
      hx-swap="innerHTML"
      hx-push-url="true"
      hx-select="#main-content > *"
    >
      <svg
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>
      <span>Hàng giờ</span>
    </a>

    <a
      href="/daily"
      data-page="daily"
      class="sidebar-link {% if active_page == 'daily' %}active{% endif %}"
      hx-get="/daily"
      hx-target="#main-content"
      hx-swap="innerHTML"
      hx-push-url="true"
      hx-select="#main-content > *"
    >
      <svg
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"
        />
      </svg>
      <span>8 ngày</span>
    </a>

    <a
      href="/alerts"
      data-page="alerts"
      class="sidebar-link {% if active_page == 'alerts' %}active{% endif %}"
      hx-get="/alerts"
      hx-target="#main-content"
      hx-swap="innerHTML"
      hx-push-url="true"
      hx-select="#main-content > *"
    >
      <svg
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"
        />
      </svg>
      <span>Cảnh báo</span>
    </a>

    <div class="sidebar-divider"></div>

    <!-- Chatbot -->
    <a
      href="/chat"
      data-page="chat"
      class="sidebar-link {% if active_page == 'chat' %}active{% endif %}"
      hx-get="/chat"
      hx-target="#main-content"
      hx-swap="innerHTML"
      hx-push-url="true"
      hx-select="#main-content > *"
    >
      <svg
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"
        />
      </svg>
      <span>Trợ lý thời tiết</span>
    </a>

    <div class="sidebar-divider"></div>

    <!-- Account -->
    {% if user %}
    <div class="px-5 py-2">
      <div class="flex items-center gap-2.5 text-gray-300 text-sm">
        <div
          class="w-7 h-7 bg-blue-500/30 rounded-full flex items-center justify-center text-xs text-blue-300 font-semibold"
        >
          {{ user.username[:1]|upper }}
        </div>
        <span class="truncate flex-1">{{ user.username }}</span>
      </div>
    </div>
    <a href="/logout" class="sidebar-link text-sm">
      <svg
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"
        />
      </svg>
      <span>Đăng xuất</span>
    </a>
    {% else %}
    <a href="/login" class="sidebar-link">
      <svg
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"
        />
      </svg>
      <span>Đăng nhập</span>
    </a>
    {% endif %}
  </nav>

  <!-- Footer -->
  <div class="px-5 py-4 text-xs text-gray-500">
    <div>HanoiAir Weather</div>
    <div>Dữ liệu: OpenWeather API</div>
  </div>
</aside>

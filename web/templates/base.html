<!doctype html>
<html lang="vi" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Thời Tiết Hà Nội{% endblock %}</title>

    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "weather-dark": "#1b1b2f",
              "weather-sidebar": "#1e2a3a",
              "weather-card": "#f7f7f7",
              "weather-accent": "#3b82f6",
            },
          },
        },
      };
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

    <style>
      /* weather.com-inspired styles */
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #f5f5f5;
      }
      .sidebar-link {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1.25rem;
        color: #e2e8f0;
        text-decoration: none;
        border-left: 3px solid transparent;
        transition: all 0.15s;
      }
      .sidebar-link:hover {
        background-color: rgba(255, 255, 255, 0.08);
        color: #fff;
      }
      .sidebar-link.active {
        background-color: rgba(59, 130, 246, 0.15);
        border-left-color: #3b82f6;
        color: #fff;
        font-weight: 600;
      }
      .sidebar-link svg {
        width: 1.25rem;
        height: 1.25rem;
        flex-shrink: 0;
      }
      .sidebar-divider {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        margin: 0.5rem 1.25rem;
      }
      /* HTMX loading indicator */
      .htmx-request .htmx-indicator {
        display: inline-block;
      }
      .htmx-indicator {
        display: none;
      }
      /* Smooth content swap */
      #main-content {
        transition: opacity 0.15s ease;
      }
      .htmx-settling #main-content {
        opacity: 1;
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body class="min-h-screen bg-gray-100">
    <div class="flex min-h-screen">
      <!-- Sidebar -->
      {% include "components/sidebar.html" %}

      <!-- Main Area -->
      <div class="flex-1 flex flex-col">
        <!-- Top Bar -->
        <header
          id="page-header"
          class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between"
        >
          <div class="flex items-center gap-3">
            <h1 id="page-heading" class="text-lg font-semibold text-gray-800">
              {% block page_heading %}Thời Tiết Hà Nội{% endblock %}
            </h1>
          </div>

          <!-- Location selector -->
          <div class="flex items-center gap-3">
            <select
              id="district-select"
              class="text-sm border border-gray-300 rounded-lg px-3 py-1.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              hx-get="/api/weather/wards"
              hx-target="#ward-select"
              hx-swap="innerHTML"
              hx-trigger="change"
              hx-include="this"
              name="district"
            >
              {% for d in districts %}
              <option
                value="{{ d.district_name_vi }}"
                {{ 'selected' if d.district_name_vi == district else '' }}
              >
                {{ d.district_name_vi }}
              </option>
              {% endfor %}
            </select>
            <select
              id="ward-select"
              class="text-sm border border-gray-300 rounded-lg px-3 py-1.5 bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
              name="ward_id"
            >
              <option value="">-- Chọn phường/xã --</option>
            </select>
            <span class="text-sm text-gray-400">|</span>
            <span class="text-sm font-medium text-gray-600">°C</span>
          </div>
        </header>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 p-6 overflow-y-auto">
          <div
            id="page-meta"
            hidden
            data-page="{{ active_page }}"
            data-heading="{% block page_heading_data %}{% endblock %}"
          ></div>
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>

    {% block scripts %}{% endblock %}
    <script>
      // === Location selector ===
      (function () {
        var districtEl = document.getElementById("district-select");
        var wardEl = document.getElementById("ward-select");

        function setCookie(name, value) {
          document.cookie =
            name + "=" + encodeURIComponent(value) + ";path=/;max-age=31536000";
        }

        function getCookie(name) {
          var match = document.cookie.match(
            new RegExp("(^| )" + name + "=([^;]+)"),
          );
          return match ? decodeURIComponent(match[2]) : null;
        }

        // On district change: save cookie (wards loaded by HTMX automatically)
        if (districtEl) {
          districtEl.addEventListener("change", function () {
            setCookie("district", this.value);
          });
        }

        // On ward change: save cookie and reload
        if (wardEl) {
          wardEl.addEventListener("change", function () {
            if (this.value) {
              setCookie("ward_id", this.value);
              window.location.reload();
            }
          });
        }

        // On page load: always fetch wards for the current district and pre-select saved ward
        var savedWardId = getCookie("ward_id");
        var currentDistrict = districtEl ? districtEl.value : null;

        if (currentDistrict && wardEl) {
          fetch(
            "/api/weather/wards?district=" +
              encodeURIComponent(currentDistrict),
          )
            .then(function (r) {
              return r.text();
            })
            .then(function (html) {
              wardEl.innerHTML = html;
              // Pre-select saved ward
              if (savedWardId) {
                var opt = wardEl.querySelector(
                  'option[value="' + savedWardId + '"]',
                );
                if (opt) opt.selected = true;
              }
            });
        }
      })();

      // === Sidebar active state + header update after HTMX swap ===
      function updatePageMeta() {
        // Look for the hidden page-meta div inside swapped content
        var meta = document.getElementById("page-meta");
        if (!meta) return;

        var activePage = meta.getAttribute("data-page");
        var heading = meta.getAttribute("data-heading");

        // Update header text
        if (heading) {
          var h = document.getElementById("page-heading");
          if (h) h.textContent = heading;
        }

        // Update sidebar active class
        if (activePage) {
          document.querySelectorAll(".sidebar-link").forEach(function (link) {
            link.classList.remove("active");
            if (link.getAttribute("data-page") === activePage) {
              link.classList.add("active");
            }
          });
        }
      }

      document.body.addEventListener("htmx:afterSwap", function (evt) {
        if (evt.detail.target && evt.detail.target.id === "main-content") {
          updatePageMeta();
        }
      });

      // Immediate sidebar active feedback on click
      document
        .querySelectorAll(".sidebar-link[data-page]")
        .forEach(function (link) {
          link.addEventListener("click", function () {
            document.querySelectorAll(".sidebar-link").forEach(function (l) {
              l.classList.remove("active");
            });
            this.classList.add("active");
          });
        });
    </script>
  </body>
</html>

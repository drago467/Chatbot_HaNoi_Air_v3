<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="sun-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#F6C026"/>
    </radialGradient>
  </defs>
  <!-- Sun rays -->
  <g stroke="#F6C026" stroke-width="3" stroke-linecap="round">
    <line x1="32" y1="6"  x2="32" y2="12"/>
    <line x1="32" y1="52" x2="32" y2="58"/>
    <line x1="6"  y1="32" x2="12" y2="32"/>
    <line x1="52" y1="32" x2="58" y2="32"/>
    <line x1="12.7" y1="12.7" x2="17" y2="17"/>
    <line x1="47" y1="47"   x2="51.3" y2="51.3"/>
    <line x1="51.3" y1="12.7" x2="47" y2="17"/>
    <line x1="17" y1="47"   x2="12.7" y2="51.3"/>
  </g>
  <!-- Sun circle -->
  <circle cx="32" cy="32" r="12" fill="url(#sun-grad)"/>
</svg>
